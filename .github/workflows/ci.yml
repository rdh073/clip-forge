name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Opt actions/checkout + actions/setup-node into the Node.js 24 runner so
# we stop getting the Node 20 deprecation annotation on every run. GitHub
# will make this the default in June 2026 anyway.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install plugin deps
        run: npm install --no-audit --no-fund

      - name: Validate plugin manifest
        run: claude plugin validate .

      - name: Lint JSON files
        run: |
          set -e
          for f in .claude-plugin/plugin.json settings.json .mcp.json hooks/hooks.json monitors/monitors.json package.json marketplace.json templates/captions/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok $f"
          done

      - name: Syntax check bin/*.mjs
        run: |
          set -e
          for f in $(find bin -name '*.mjs'); do
            node --check "$f" && echo "ok $f"
          done

      - name: Syntax check bin/* shell scripts
        run: |
          set -e
          for f in bin/cf-ytdlp; do
            sh -n "$f" && echo "ok $f"
          done

      - name: Syntax check Node CLIs (no .mjs ext but Node shebang)
        run: |
          set -e
          for f in bin/cf-ffmpeg bin/cf-reframe bin/cf-caption-burn \
                   bin/cf-whisper bin/cf-enhance bin/cf-tighten \
                   bin/cf-clip bin/cf-voice-clone bin/cf-dub \
                   bin/cf-brand-kit bin/cf-edit bin/cf-broll-ai \
                   bin/cf-avatar; do
            node --check "$f" && echo "ok $f"
          done

      - name: Install ffmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg with libass (macOS)
        if: matrix.os == 'macos-latest'
        # Default `brew install ffmpeg` ships WITHOUT --enable-libass (verified
        # via configure-line diagnostic in CI). The `homebrew-ffmpeg/ffmpeg`
        # tap's formula is the "full build" — includes libass, libfreetype,
        # libfontconfig and friends required for the `ass` / `subtitles`
        # filters that v0.3.0 pillar i (hook overlay) + every render path
        # since pillar 2 depend on.
        run: |
          brew uninstall --ignore-dependencies --force ffmpeg || true
          brew tap homebrew-ffmpeg/ffmpeg
          brew install homebrew-ffmpeg/ffmpeg/ffmpeg

      - name: Diagnose ffmpeg build (filter availability)
        run: |
          which ffmpeg
          ffmpeg -version 2>&1 | head -5
          echo '--- libass / subtitles filters ---'
          ffmpeg -hide_banner -filters 2>&1 | grep -iE '(ass|subtitles|drawtext|drawbox)' || echo 'NONE FOUND'

      - name: Install ONNX models
        # Required so success-path integration tests actually run instead of
        # skipping. The two models total ~4 MB; ~5 s on either runner.
        run: npm run install-models

      - name: Run tests
        run: npm test
