name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install plugin deps
        run: npm install --no-audit --no-fund

      - name: Validate plugin manifest
        run: claude plugin validate .

      - name: Lint JSON files
        run: |
          set -e
          for f in .claude-plugin/plugin.json settings.json .mcp.json hooks/hooks.json monitors/monitors.json package.json marketplace.json templates/captions/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok $f"
          done

      - name: Syntax check bin/*.mjs
        run: |
          set -e
          for f in $(find bin -name '*.mjs'); do
            node --check "$f" && echo "ok $f"
          done

      - name: Syntax check bin/* shell scripts
        run: |
          set -e
          for f in bin/cf-ytdlp bin/cf-whisper; do
            sh -n "$f" && echo "ok $f"
          done

      - name: Syntax check Node CLIs (no .mjs ext but Node shebang)
        run: |
          set -e
          for f in bin/cf-ffmpeg bin/cf-reframe bin/cf-caption-burn; do
            node --check "$f" && echo "ok $f"
          done

      - name: Install ffmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Run tests
        run: npm test
