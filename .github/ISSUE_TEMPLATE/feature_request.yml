name: ✨ Feature request
description: Suggest a new skill, agent, MCP integration, or behaviour change.
title: "[feature] "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Please describe the problem first, then the solution
        you'd like — that way we can evaluate alternatives together.

  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: What can't you do today? What's the pain point?
      placeholder: |
        When I X, the plugin does Y, but I need Z because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behaviour or interface look like?
      placeholder: |
        Add a `--foo` flag to cf-reframe that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they fall short.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
